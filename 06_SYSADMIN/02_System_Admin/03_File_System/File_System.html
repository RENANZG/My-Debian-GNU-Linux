<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Systems and Encrypted Flash Drive Setup</title>
    <style>
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border: 1px solid #ddd;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h1>File Systems Comparison</h1>
<table><thead>
  <tr>
    <th colspan="2">Features</th>
    <th>Ext4</th>
    <th>XFS</th>
    <th>BtrFS</th>
    <th>ZFS</th>
  </tr></thead>
<tbody>
  <tr>
    <td rowspan="4">Resize Capabilities</td>
    <td>Online Grow</td>
    <td>Yes</td>
    <td>Yes</td>
    <td>Yes</td>
    <td>Yes</td>
  </tr>
  <tr>
    <td>Online Shrink</td>
    <td>No</td>
    <td>No</td>
    <td>No</td>
    <td>No</td>
  </tr>
  <tr>
    <td>Offline Grow</td>
    <td>Yes</td>
    <td>No</td>
    <td>No</td>
    <td>No</td>
  </tr>
  <tr>
    <td>Offline Shrink</td>
    <td>Yes</td>
    <td>Yes</td>
    <td>Yes</td>
    <td>No</td>
  </tr>
  <tr>
    <td colspan="2">RAID Solution Provided</td>
    <td>No</td>
    <td>No</td>
    <td>Yes</td>
    <td>Yes</td>
  </tr>
  <tr>
    <td colspan="2">Volume Manager</td>
    <td>LVM/MD</td>
    <td>LVM/MD</td>
    <td>LVM/MD or BtrFS</td>
    <td>ZFS</td>
  </tr>
  <tr>
    <td colspan="2">RBD support</td>
    <td>Yes</td>
    <td>Yes</td>
    <td>Yes</td>
    <td>Yes</td>
  </tr>
</tbody>
</table>

</body>
</html>
